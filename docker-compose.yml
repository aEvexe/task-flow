version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: taskflow-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/taskflow
      - JWT_SECRET=taskflow-docker-secret-change-in-production
      - PORT=3000
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
